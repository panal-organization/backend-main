---
name: Local CI/CD (Self-hosted)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Permite correr manualmente el pipeline desde GitHub UI.
  workflow_dispatch:
    inputs:
      run_verify_stack:
        description: "Ejecutar job opcional verify-stack"
        required: false
        default: true
        type: boolean

  # CI automatico en ramas principales.
  push:
    branches:
      - main
      - master

  # Validacion en pull requests hacia ramas principales.
  pull_request:
    branches:
      - main
      - master

jobs:
  local-devops-pipeline:
    # Todo se ejecuta en tu runner local de Windows.
    runs-on: [self-hosted, windows, panal]
    env:
      DOCKER_CONFIG: ${{ github.workspace }}/.docker-ci

    steps:
      # CI/CD - Source stage: clonar codigo del repo.
      - name: Checkout repository
        uses: actions/checkout@v4

      # CI/CD - Docker auth isolation: evita usar cred helpers ligados a sesion de Windows.
      - name: Prepare isolated Docker config
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path $env:DOCKER_CONFIG -Force | Out-Null
          '{"auths":{"https://index.docker.io/v1/":{}}}' | Set-Content -Path (Join-Path $env:DOCKER_CONFIG 'config.json') -Encoding ascii
          Write-Output "Using DOCKER_CONFIG=$env:DOCKER_CONFIG"

      # CI/CD - Build prep: garantizar .env minimo para stack local.
      - name: Ensure .env exists for local runner
        shell: powershell
        run: |
          if (-not (Test-Path .env)) {
            $envLines = @(
              'MONGODB_URI=mongodb://mongo:27017/APLICACIONES',
              'MONGODB_URI_LOCAL=mongodb://mongo:27017/APLICACIONES',
              'PORT=3000',
              'AI_SERVICE_URL=http://127.0.0.1:8000',
              'AI_SERVICE_URL_DOCKER=http://host.docker.internal:8000',
              'AI_INTERNAL_API_KEY=panal_internal_dev_key',
              'AI_DEMO_MODE=true',
              'AI_DEMO_USER_ID=699d2f62b00a373767e0adc1',
              'AI_DEMO_WORKSPACE_ID=69a3e13581a5be4cb1bd8bc8',
              'SMTP_HOST=smtp.gmail.com',
              'SMTP_PORT=587',
              'SMTP_USER=local@example.com',
              'SMTP_PASS=localpass',
              'SMTP_SECURE=false',
              'ADMIN_NOTIFICATION_EMAIL=local@example.com',
              'GRAFANA_USER=admin',
              'GRAFANA_PASSWORD=admin'
            )
            Set-Content -Path .env -Value ($envLines -join "`n") -Encoding UTF8
            Write-Output "Generated .env for local CI/CD run"
          } else {
            Write-Output ".env already exists"
          }

      # CI/CD - Build stage: preparar runtime Node para backend.
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # CI/CD - Build stage: instalar dependencias.
      - name: Install dependencies
        shell: powershell
        run: npm install

      # CI/CD - Quality gate (opcional): lint solo si existe script lint.
      - name: Run lint if present
        shell: powershell
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          if ($pkg.scripts.PSObject.Properties.Name -contains 'lint') {
            npm run lint
          } else {
            Write-Output "No lint script found. Skipping."
          }

      # CI/CD - Quality gate (opcional): test solo si existe script test real.
      - name: Run tests if present
        shell: powershell
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $hasTest = $pkg.scripts.PSObject.Properties.Name -contains 'test'
          $defaultTest = $hasTest -and ($pkg.scripts.test -match 'no test specified')
          if ($hasTest -and -not $defaultTest) {
            npm test
          } else {
            Write-Output "No real test script found. Skipping."
          }

      # CI/CD - Static syntax check del backend.
      - name: Basic backend syntax validation
        shell: powershell
        run: |
          node -c index.js
          node -c src/app.js

      # CI/CD - Security scan (filesystem) con Trivy.
      - name: Trivy filesystem scan
        shell: powershell
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" aquasec/trivy:0.53.0 fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL --exit-code 0 /workspace

      # CI/CD - Build stage: construir imagen Docker del backend.
      - name: Build Docker image
        shell: powershell
        run: |
          $imageTag = "panal-backend:${{ github.sha }}"

          Write-Output "Docker version:"
          docker version

          Write-Output "Docker system usage before build:"
          docker system df

          $maxRetries = 2
          for ($attempt = 1; $attempt -le $maxRetries; $attempt++) {
            Write-Output "Docker build attempt $attempt/$maxRetries"
            docker build --progress=plain -t $imageTag .
            if ($LASTEXITCODE -eq 0) {
              Write-Output "Docker build OK"
              exit 0
            }

            Write-Warning "Docker build failed in attempt $attempt"
            if ($attempt -lt $maxRetries) {
              Write-Output "Retrying build in 5 seconds..."
              Start-Sleep -Seconds 5
            }
          }

          throw "Docker build failed after retries"

      # CI/CD - Security scan (image) con Trivy.
      - name: Trivy image scan
        shell: powershell
        run: |
          docker save panal-backend:${{ github.sha }} -o panal-backend-image.tar
          docker run --rm -v "${{ github.workspace }}:/workspace" aquasec/trivy:0.53.0 image --input /workspace/panal-backend-image.tar --severity HIGH,CRITICAL --exit-code 0

      # CI/CD - Hygiene: limpiar residuos de ejecuciones anteriores en runner self-hosted.
      - name: Cleanup previous stack state
        shell: powershell
        run: |
          docker compose down --remove-orphans
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "docker compose down returned non-zero. Continuing."
          }

      # CI/CD - Deploy stage local: levantar stack completo de observabilidad.
      - name: Deploy Docker Compose stack
        shell: powershell
        run: docker compose up -d --build

      # CI/CD - Readiness gate: esperar a que el contenedor backend este healthy.
      - name: Wait backend container health
        shell: powershell
        run: |
          $maxChecks = 60
          $healthy = $false

          for ($i = 1; $i -le $maxChecks; $i++) {
            $status = docker inspect panal-backend --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}" 2>$null
            if (-not $status) {
              Write-Output "Container panal-backend not found yet ($i/$maxChecks)"
            } else {
              Write-Output "panal-backend status: $status ($i/$maxChecks)"
              if ($status -eq 'healthy' -or $status -eq 'running') {
                $healthy = $true
                break
              }
            }

            Start-Sleep -Seconds 3
          }

          if (-not $healthy) {
            Write-Output "Container did not reach healthy/running state in time."
            Write-Output "===== docker compose ps ====="
            docker compose ps
            Write-Output "===== backend logs (tail 200) ====="
            docker logs --tail 200 panal-backend
            throw "Backend container readiness failed"
          }

      # CI/CD - Health gate: backend debe responder en /health.
      - name: Backend health check (/health)
        shell: powershell
        run: |
          $maxRetries = 60
          $isHealthy = $false

          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:3000/health -TimeoutSec 5
              if ($r.StatusCode -eq 200) {
                Write-Output "Health check OK"
                $isHealthy = $true
                break
              }
            } catch {
              Write-Output "Health check retry $i/$maxRetries"
            }
            Start-Sleep -Seconds 3
          }

          if (-not $isHealthy) {
            Write-Output "Backend health check failed. Collecting diagnostics..."
            Write-Output "===== docker compose ps ====="
            docker compose ps

            Write-Output "===== docker ps -a ====="
            docker ps -a

            Write-Output "===== backend logs (tail 200) ====="
            docker logs --tail 200 panal-backend

            throw "Health check failed after retries"
          }

      # CI/CD - Observability validation: usa script existente del proyecto.
      # Nota: no depende del frontend demo y no falla por AI local ausente.
      - name: Run devops extended check
        shell: powershell
        run: powershell -NoProfile -File scripts/devops-demo-check.ps1 -SkipBuild

  verify-stack:
    # Job opcional para validaciones HTTP basicas del stack ya levantado.
    runs-on: [self-hosted, windows, panal]
    needs: local-devops-pipeline
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_verify_stack == true }}

    steps:
      # Este job tambien corre sobre el runner local.
      - name: Verify backend /health endpoint
        shell: powershell
        run: |
          $r = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:3000/health -TimeoutSec 8
          if ($r.StatusCode -ne 200) {
            throw "Expected 200 in /health, got $($r.StatusCode)"
          }
          Write-Output "/health OK"

      - name: Verify backend /metrics endpoint
        shell: powershell
        run: |
          $r = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:3000/metrics -TimeoutSec 8
          if ($r.StatusCode -ne 200) {
            throw "Expected 200 in /metrics, got $($r.StatusCode)"
          }
          if ($r.Content -notmatch 'panal_app_up') {
            throw "/metrics response does not contain panal_app_up"
          }
          Write-Output "/metrics OK"

